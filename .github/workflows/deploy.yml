name: Deploy test web BadLogin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Call deploy endpoint
        run: |
          HTTP_CODE=$(curl \
            -sS \
            -o response.txt \
            -w "%{http_code}" \
            -X POST "${{ secrets.DEPLOY_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -d '{"ref":"main","sha":"${{ github.sha }}"}')

          cat response.txt

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi